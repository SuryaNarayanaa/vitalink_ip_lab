name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ADMIN_TOTP_ENCRYPTION_KEY: test-only-admin-totp-encryption-key-32b
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject tracked upload artifacts
        working-directory: ${{ github.workspace }}
        run: |
          tracked="$(git ls-files 'backend/uploads/**' 'backend/uploads/*' 2>/dev/null || true)"
          # Allow empty placeholder only if policy changes; any content under uploads is forbidden.
          if [ -n "$tracked" ]; then
            echo "Tracked files under backend/uploads/ are not allowed:"
            echo "$tracked"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI spec
        run: npm run lint:openapi

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npx jest --coverage
