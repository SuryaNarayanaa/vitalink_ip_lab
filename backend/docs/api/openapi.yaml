  /devices/register:
    post:
      tags: [Devices]
      summary: Register or refresh an FCM device token
      description: |
        Upserts the physical FCM token as the caller's ownership record.

        - A given `fcm_token` has exactly one current owner globally.
        - Re-registering the same physical token under a different authenticated user
          transfers delivery ownership to that user.
        - Other active tokens for the same user and platform are deactivated so only the
          newly registered physical device remains active for that platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegisterRequest"
      responses:
        "201":
          description: Device token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /devices/{tokenId}:
    delete:
      tags: [Devices]
      summary: Deregister an FCM device token
      description: |
        Deactivates the caller's active device token document. Ownership is enforced by
        matching both the token document id and the authenticated user.
      parameters:
        - $ref: "#/components/parameters/DeviceTokenIdPath"
      responses:
        "200":
          description: Device token deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `POST /auth/login`. Send as `Authorization: Bearer <token>`.
        Route-level authorization is role-based: patient routes require PATIENT users,
        doctor routes require DOCTOR users, and admin/statistics routes require ADMIN users.

  headers:
    XRequestId:
      description: Server-generated or client-forwarded correlation ID
      schema:
        type: string

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Resource identifier
    OpNumPath:
      in: path
      name: op_num
      required: true
      schema:
        type: string
      description: Patient OP number, mapped to the patient user's login_id
    ReportIdPath:
      in: path
      name: report_id
      required: true
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
    NotificationIdPath:
      in: path
      name: notification_id
      required: true
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
    EventIdPath:
      in: path
      name: event_id
      required: true
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
    DeviceTokenIdPath:
      in: path
      name: tokenId
      required: true
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
      description: DeviceToken document id returned by POST /devices/register
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IsReadQuery:
      in: query
      name: is_read
      required: false
      schema:
        type: boolean
    UnreadOnlyQuery:
      in: query
      name: unread_only
      required: false
      schema:
        type: boolean
    MonthsQuery:
      in: query
      name: months
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 6
        default: 3
    StartDateQuery:
      in: query
      name: start_date
      required: false
      schema:
        type: string
        pattern: "^[0-9]{2}-[0-9]{2}-[0-9]{4}$"
      description: Date in DD-MM-YYYY format

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Locked:
      description: Account locked
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LoginRateLimited:
      description: Too many login attempts
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RateLimitResponse"
    InsufficientStorage:
      description: File storage provider failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ApiResponseBase:
      type: object
      required: [statusCode, message, success]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        success:
          type: boolean
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
            - type: "null"

    SimpleSuccessResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout successful. Please clear the token from client-side.

    MessageOnlyResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: "null"

    DevicePlatform:
      type: string
      enum: [android, ios, web]

    DeviceRegisterRequest:
      type: object
      required: [fcm_token, platform]
      properties:
        fcm_token:
          type: string
          minLength: 1
          description: Physical FCM registration token for this device
        platform:
          $ref: "#/components/schemas/DevicePlatform"
        app_version:
          type: string
          description: Optional client application version string

    DeviceRegisterResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              required: [token_id]
              properties:
                token_id:
                  type: string
                  description: DeviceToken document id for later deregistration

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          example:
            statusCode: 401
            message: Invalid credentials
            data: null
            success: false

    RateLimitResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Too many requests from this IP, please try again later

    ValidationErrorItem:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                errors:
                  type: array
                  items:
                    $ref: "#/components/schemas/ValidationErrorItem"

    Pagination:
      type: object
      required: [total, page, limit, pages, hasNext, hasPrev]
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    ApiIndexResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                version:
                  type: string
                  example: v1
                routes:
                  type: array
                  items:
                    type: string

    LoginRequest:
      type: object
      required: [login_id, password]
      properties:
        login_id:
          type: string
          minLength: 1
          example: patient001
        password:
          type: string
          minLength: 1
          format: password

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 1
          description: Opaque refresh token returned by login or refresh.

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          minLength: 8
          format: password
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z0-9]).{8,}$"

    PublicHospital:
      type: object
      properties:
        _id:
          type: string
        code:
          type: string
        name:
          type: string
        location:
          type: string
        status:
          type: string

    UserProfileRef:
      type: object
      description: Populated role profile. Shape varies by user type.
      additionalProperties: true

    User:
      type: object
      properties:
        _id:
          type: string
        login_id:
          type: string
        user_type:
          type: string
          enum: [ADMIN, DOCTOR, PATIENT]
        profile_id:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/UserProfileRef"
        is_active:
          type: boolean
        must_change_password:
          type: boolean
        password_expired:
          type: boolean
          description: True when the configured password expiry window has elapsed.
        password_changed_at:
          type: [string, "null"]
          format: date-time
        password_expires_at:
          type: [string, "null"]
          format: date-time
        password_policy:
          type: object
          properties:
            expiry_days:
              type: integer
              description: Configured password expiry interval. Zero disables expiry.
            history_count:
              type: integer
              description: Number of previous passwords checked for reuse. Zero disables stored history checks.
        failed_login_attempts:
          type: integer
        locked_until:
          type: [string, "null"]
          format: date-time
        last_login_at:
          type: [string, "null"]
          format: date-time

    SessionPayload:
      type: object
      required: [token, refresh_token, session]
      properties:
        token:
          type: string
          description: Bearer access JWT.
        refresh_token:
          type: string
          description: Opaque refresh token. Store securely on the client; only a hash is stored server-side.
        session:
          type: object
          required: [session_id, refresh_expires_at]
          properties:
            session_id:
              type: string
            refresh_expires_at:
              type: string
              format: date-time

    SessionResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SessionPayload"

    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/SessionPayload"
                - type: object
                  required: [user]
                  properties:
                    user:
                      $ref: "#/components/schemas/User"

    MeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/User"

    ChangePasswordResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                must_change_password:
                  type: boolean
                password_expired:
                  type: boolean
                password_changed_at:
                  type: [string, "null"]
                  format: date-time
                password_expires_at:
                  type: [string, "null"]
                  format: date-time
                invalidated_sessions:
                  type: integer
                  minimum: 0
                  description: Number of active sessions revoked by the password change.

    DosageSchedule:
      type: object
      properties:
        monday: { type: number, default: 0 }
        tuesday: { type: number, default: 0 }
        wednesday: { type: number, default: 0 }
        thursday: { type: number, default: 0 }
        friday: { type: number, default: 0 }
        saturday: { type: number, default: 0 }
        sunday: { type: number, default: 0 }

    MedicalHistoryItem:
      type: object
      properties:
        diagnosis:
          type: string
        duration_value:
          type: number
        duration_unit:
          type: string
          enum: [Days, Weeks, Months, Years]

    TargetInr:
      type: object
      properties:
        min:
          type: number
        max:
          type: number

    PrimaryPhoneNumber:
      type: string
      pattern: "^[0-9]{10}$"
      minLength: 10
      maxLength: 10
      description: Required primary SMS phone number for doctor and patient login verification.

    PhoneVerificationState:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, VERIFIED]
          default: PENDING
        verified_at:
          type: [string, "null"]
          format: date-time

    NextOfKin:
      type: object
      properties:
        name:
          type: string
        relation:
          type: string
        relationship:
          type: string
        phone:
          type: string

    PatientDemographics:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [Male, Female, Other]
        phone:
          $ref: "#/components/schemas/PrimaryPhoneNumber"
        phone_verification:
          $ref: "#/components/schemas/PhoneVerificationState"
        next_of_kin:
          $ref: "#/components/schemas/NextOfKin"

    MedicalConfig:
      type: object
      properties:
        diagnosis:
          type: string
        therapy_drug:
          type: string
        therapy_start_date:
          type: [string, "null"]
          format: date-time
        target_inr:
          $ref: "#/components/schemas/TargetInr"
        next_review_date:
          type: [string, "null"]
          format: date-time
        instructions:
          type: array
          items:
            type: string
        taken_doses:
          type: array
          items:
            type: string
            format: date-time

    InrHistoryItem:
      type: object
      properties:
        _id:
          type: string
        test_date:
          type: string
          format: date-time
        uploaded_at:
          type: string
          format: date-time
        inr_value:
          type: number
        is_critical:
          type: boolean
        file_url:
          type: [string, "null"]
          description: Short-lived presigned URL on reads; retained object key in storage for migration compatibility.
        file_asset_id:
          type: [string, "null"]
          readOnly: true
          description: Tenant-scoped FileAsset identifier for new and backfilled uploads.
        notes:
          type: [string, "null"]

    HealthLogItem:
      type: object
      properties:
        date:
          type: string
          format: date-time
        type:
          type: string
        description:
          type: string
        feedback:
          oneOf:
            - type: string
            - type: boolean
            - type: "null"

    PatientProfile:
      type: object
      properties:
        _id:
          type: string
        assigned_doctor_id:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/User"
        hospital_id:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/PublicHospital"
        demographics:
          $ref: "#/components/schemas/PatientDemographics"
        medical_config:
          $ref: "#/components/schemas/MedicalConfig"
        medical_history:
          type: array
          items:
            $ref: "#/components/schemas/MedicalHistoryItem"
        weekly_dosage:
          $ref: "#/components/schemas/DosageSchedule"
        inr_history:
          type: array
          items:
            $ref: "#/components/schemas/InrHistoryItem"
        health_logs:
          type: array
          items:
            $ref: "#/components/schemas/HealthLogItem"
        account_status:
          type: string
          enum: [Active, Discharged, Deceased]
        profile_picture_url:
          type: [string, "null"]
        profile_picture_file_asset_id:
          type: [string, "null"]
          readOnly: true
        login_id:
          type: [string, "null"]

    DoctorProfile:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        department:
          type: string
        contact_number:
          $ref: "#/components/schemas/PrimaryPhoneNumber"
        phone_verification:
          $ref: "#/components/schemas/PhoneVerificationState"
        profile_picture_url:
          type: [string, "null"]
        profile_picture_file_asset_id:
          type: [string, "null"]
          readOnly: true
        hospital_id:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/PublicHospital"

    NotificationEvent:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, URGENT]
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
        read_at:
          type: [string, "null"]
          format: date-time
        data:
          type: object
          additionalProperties: true

    DoctorUpdateEvent:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        message:
          type: string
        change_type:
          type: string
        changed_fields:
          type: array
          items:
            type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
        changed_by_doctor_id:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
            - type: "null"

    NotificationListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                notifications:
                  type: array
                  items:
                    $ref: "#/components/schemas/NotificationEvent"
                pagination:
                  $ref: "#/components/schemas/Pagination"
                unread_count:
                  type: integer

    DoctorUpdateSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                unread_count:
                  type: integer
                latest:
                  anyOf:
                    - $ref: "#/components/schemas/DoctorUpdateEvent"
                    - type: "null"

    DoctorUpdateListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                updates:
                  type: array
                  items:
                    $ref: "#/components/schemas/DoctorUpdateEvent"

    MarkedCountResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                marked_count:
                  type: integer

    PatientProfileResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patient:
                  $ref: "#/components/schemas/User"
                doctor_updates:
                  type: object
                  properties:
                    unread_count:
                      type: integer
                    latest:
                      anyOf:
                        - $ref: "#/components/schemas/DoctorUpdateEvent"
                        - type: "null"

    PatientReportsPayload:
      type: object
      properties:
        inr_history:
          type: array
          items:
            $ref: "#/components/schemas/InrHistoryItem"
        health_logs:
          type: array
          items:
            $ref: "#/components/schemas/HealthLogItem"
        weekly_dosage:
          $ref: "#/components/schemas/DosageSchedule"
        medical_config:
          $ref: "#/components/schemas/MedicalConfig"

    PatientReportsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                report:
                  $ref: "#/components/schemas/PatientReportsPayload"

    PatientReportUploadRequest:
      type: object
      required: [inr_value, test_date]
      properties:
        inr_value:
          type: string
          example: "2.7"
        test_date:
          type: string
          pattern: "^[0-9]{2}-[0-9]{2}-[0-9]{4}$"
          example: 05-07-2026
        file:
          type: string
          format: binary
          description: Optional PDF or image up to 10 MB

    PatientReportSubmitResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patient:
                  $ref: "#/components/schemas/PatientProfile"

    PatientProfileUpdateRequest:
      type: object
      properties:
        demographics:
          $ref: "#/components/schemas/PatientDemographics"
        medical_history:
          type: array
          items:
            $ref: "#/components/schemas/MedicalHistoryItem"
        medical_config:
          type: object
          properties:
            therapy_start_date:
              oneOf:
                - type: string
                  format: date-time
                - type: string
                  pattern: "^[0-9]{2}-[0-9]{2}-[0-9]{4}$"

    PatientProfileUpdateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                profile:
                  $ref: "#/components/schemas/PatientProfile"

    TakeDosageRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          pattern: "^[0-9]{2}-[0-9]{2}-[0-9]{4}$"
          example: 05-07-2026

    TakeDosageResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patient:
                  $ref: "#/components/schemas/PatientProfile"

    MissedDoseResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                recent_missed_doses:
                  type: array
                  items:
                    type: string
                missed_doses:
                  type: array
                  items:
                    type: string

    CalendarDataItem:
      type: object
      properties:
        date:
          type: string
        status:
          type: string
          enum: [taken, missed, scheduled]
        dosage:
          type: number
        day_of_week:
          type: string

    DosageCalendarResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                calendar_data:
                  type: array
                  items:
                    $ref: "#/components/schemas/CalendarDataItem"
                date_range:
                  type: object
                  properties:
                    start:
                      type: string
                    end:
                      type: string
                therapy_start:
                  type: string

    HealthLogRequest:
      type: object
      required: [type, description]
      properties:
        type:
          type: string
          example: BLEEDING
        description:
          type: string

    ProfilePictureUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: PNG, JPEG, JPG, or WEBP up to 5 MB

    DoctorProfileResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                doctor:
                  $ref: "#/components/schemas/User"
                patients_count:
                  type: integer

    DoctorProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        department:
          type: string
        contact_number:
          $ref: "#/components/schemas/PrimaryPhoneNumber"

    DoctorListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                doctors:
                  type: array
                  items:
                    $ref: "#/components/schemas/User"

    DoctorPatientListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patients:
                  type: array
                  items:
                    $ref: "#/components/schemas/PatientProfile"

    DoctorPatientDetailResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patient:
                  $ref: "#/components/schemas/PatientProfile"

    DoctorCreatePatientRequest:
      type: object
      required:
        - name
        - op_num
        - gender
        - contact_no
        - kin_contact_number
      properties:
        name:
          type: string
        op_num:
          type: string
        age:
          type: number
          maximum: 100
        gender:
          type: string
          enum: [Male, Female, Other]
        contact_no:
          $ref: "#/components/schemas/PrimaryPhoneNumber"
        target_inr_min:
          type: number
        target_inr_max:
          type: number
        therapy:
          type: string
        therapy_start_date:
          type: string
          example: 05-07-2026
        prescription:
          $ref: "#/components/schemas/DosageSchedule"
        medical_history:
          type: array
          items:
            $ref: "#/components/schemas/MedicalHistoryItem"
        kin_name:
          type: string
        kin_relation:
          type: string
        kin_contact_number:
          type: string

    DoctorPatientCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                patient:
                  $ref: "#/components/schemas/PatientProfile"

    ReassignPatientRequest:
      type: object
      required: [new_doctor_id]
      properties:
        new_doctor_id:
          type: string

    UpdateDosageRequest:
      type: object
      required: [prescription]
      properties:
        prescription:
          $ref: "#/components/schemas/DosageSchedule"

    DoctorReportListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                inr_history:
                  type: array
                  items:
                    $ref: "#/components/schemas/InrHistoryItem"

    DoctorSingleReportResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                report:
                  $ref: "#/components/schemas/InrHistoryItem"

    UpdateReportRequest:
      type: object
      properties:
        is_critical:
          type: boolean
        notes:
          type: string

    UpdateNextReviewRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
