openapi: 3.1.0
info:
  title: VitaLink API
  version: 1.0.0
  summary: Versioned API contract for the VitaLink backend
  description: |
    OpenAPI specification for the currently implemented VitaLink backend.

    Notes:
    - The canonical integration base path is `/api/v1`.
    - Legacy `/api/*` routes remain available for backward compatibility but are deprecated.
    - Authentication uses revocable bearer JWT sessions with opaque refresh tokens.
    - Most application responses use `{ statusCode, message, data, success }`; a few authentication middleware and rate-limit responses use the older `{ success, message }` envelope.
    - Versioned responses expose `X-API-Version` and `X-API-Supported-Versions`. Legacy `/api/*` responses also expose `Deprecation`, `Sunset`, and `Link` headers.
    - Patient and doctor notification streams are Server-Sent Events (SSE). Browser EventSource clients may pass the JWT as a `token` query parameter when they cannot set an Authorization header.
    - Multipart upload endpoints accept a single form field named `file`; validation failures such as unsupported MIME type or size limit return 400, while cloud storage failures return 507.
  contact:
    name: VitaLink Engineering
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.vitalink.invalid/api/v1
    description: Production deployment placeholder
tags:
  - name: System
    description: API indexes, health checks, and version metadata.
  - name: Authentication
    description: Login, logout, session identity, and password lifecycle.
  - name: Patient
    description: Patient profile, reports, dosage, health logs, notifications, and SSE streams.
  - name: Doctor
    description: Doctor profile, patient management, report review, notifications, and SSE streams.
  - name: Admin
    description: Administrative management for users, hospitals, roles, billing, audit logs, and configuration.
  - name: Statistics
    description: Administrative analytics and aggregate operational metrics.
  - name: Devices
    description: Authenticated FCM device token registration and deregistration for push delivery.
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags: [System]
      summary: API version index
      security: []
      responses:
        "200":
          description: API version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndexResponse"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user
      description: Authenticates a user by login ID and password and returns a revocable session payload.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "423":
          $ref: "#/components/responses/Locked"
        "429":
          $ref: "#/components/responses/LoginRateLimited"

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout current user
      description: Revokes the current authenticated session.
      responses:
        "200":
          description: Logout acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh session
      description: Rotates a valid refresh token and returns a new access token and refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/revoke:
    post:
      tags: [Authentication]
      summary: Revoke session by refresh token
      description: Revokes the session associated with the submitted refresh token, if one exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current authenticated user
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/change-password:
    post:
      tags: [Authentication]
      summary: Change current user password
      description: Changes the authenticated user's password and revokes all active sessions for that user, including the session used for the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/profile:
    get:
      tags: [Patient]
      summary: Get patient profile
      responses:
        "200":
          description: Patient profile with doctor update summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Patient]
      summary: Update patient profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/reports:
    get:
      tags: [Patient]
      summary: Get patient reports and care data
      responses:
        "200":
          description: Patient report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientReportsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Patient]
      summary: Submit INR report
      description: Submit INR value, test date, and optional report attachment.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PatientReportUploadRequest"
      responses:
        "200":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientReportSubmitResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "507":
          $ref: "#/components/responses/InsufficientStorage"

  /patient/missed-doses:
    get:
      tags: [Patient]
      summary: Get missed dose calculations
      responses:
        "200":
          description: Missed dose calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissedDoseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/dosage-calendar:
    get:
      tags: [Patient]
      summary: Get dosage calendar
      parameters:
        - $ref: "#/components/parameters/MonthsQuery"
        - $ref: "#/components/parameters/StartDateQuery"
      responses:
        "200":
          description: Calendar data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DosageCalendarResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/dosage:
    post:
      tags: [Patient]
      summary: Mark dosage as taken
      description: Records a dose only for a scheduled date on or after therapy start and not later than the current clinical date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TakeDosageRequest"
      responses:
        "200":
          description: Dosage marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TakeDosageResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/health-logs:
    post:
      tags: [Patient]
      summary: Create or replace health log by type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthLogRequest"
      responses:
        "200":
          description: Health log updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/profile-pic:
    post:
      tags: [Patient]
      summary: Upload patient profile picture
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProfilePictureUploadRequest"
      responses:
        "200":
          description: Profile picture updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "507":
          $ref: "#/components/responses/InsufficientStorage"

  /patient/doctor-updates/summary:
    get:
      tags: [Patient]
      summary: Get doctor update summary
      responses:
        "200":
          description: Doctor update summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorUpdateSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/doctor-updates:
    get:
      tags: [Patient]
      summary: List doctor updates
      parameters:
        - $ref: "#/components/parameters/UnreadOnlyQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Doctor updates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorUpdateListResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/doctor-updates/read-all:
    patch:
      tags: [Patient]
      summary: Mark all doctor updates as read
      responses:
        "200":
          description: Doctor updates marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkedCountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/doctor-updates/{event_id}/read:
    patch:
      tags: [Patient]
      summary: Mark doctor update as read
      parameters:
        - $ref: "#/components/parameters/EventIdPath"
      responses:
        "200":
          description: Doctor update marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/notifications:
    get:
      tags: [Patient]
      summary: List patient notifications
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/IsReadQuery"
      responses:
        "200":
          description: Notification inbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/notifications/read-all:
    patch:
      tags: [Patient]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkedCountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /patient/notifications/{notification_id}/read:
    patch:
      tags: [Patient]
      summary: Mark notification as read
      parameters:
        - $ref: "#/components/parameters/NotificationIdPath"
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /patient/notifications/stream:
    get:
      tags: [Patient]
      summary: Stream patient notifications
      description: |
        Opens a Server-Sent Events connection. Authentication may be supplied with
        a bearer token or a `token` query parameter.
      parameters:
        - in: query
          name: token
          required: false
          schema:
            type: string
          description: Optional JWT when Authorization header is not used
      responses:
        "200":
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: notification
                  data: {"id":"6870...","title":"Doctor update"}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /doctors/profile:
    get:
      tags: [Doctor]
      summary: Get doctor profile
      responses:
        "200":
          description: Doctor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Doctor]
      summary: Update doctor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/profile-pic:
    post:
      tags: [Doctor]
      summary: Upload doctor profile picture
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProfilePictureUploadRequest"
      responses:
        "200":
          description: Profile picture updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "507":
          $ref: "#/components/responses/InsufficientStorage"

  /doctors/doctors:
    get:
      tags: [Doctor]
      summary: List doctors
      responses:
        "200":
          description: Doctors retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /doctors/patients:
    get:
      tags: [Doctor]
      summary: List patients assigned to current doctor
      responses:
        "200":
          description: Patients retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Doctor]
      summary: Create patient under current doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorCreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientCreateResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /doctors/patients/{op_num}:
    get:
      tags: [Doctor]
      summary: Get patient by OP number
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      responses:
        "200":
          description: Patient retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/reassign:
    patch:
      tags: [Doctor]
      summary: Reassign patient to another doctor
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReassignPatientRequest"
      responses:
        "200":
          description: Patient reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/dosage:
    put:
      tags: [Doctor]
      summary: Update weekly dosage
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDosageRequest"
      responses:
        "200":
          description: Dosage updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/reports:
    get:
      tags: [Doctor]
      summary: List patient INR reports
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      responses:
        "200":
          description: Reports retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorReportListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/reports/{report_id}:
    get:
      tags: [Doctor]
      summary: Get patient report by report ID
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
        - $ref: "#/components/parameters/ReportIdPath"
      responses:
        "200":
          description: Report retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorSingleReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Doctor]
      summary: Update report annotations
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
        - $ref: "#/components/parameters/ReportIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportRequest"
      responses:
        "200":
          description: Report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorSingleReportResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/config:
    put:
      tags: [Doctor]
      summary: Update next review date
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNextReviewRequest"
      responses:
        "200":
          description: Review date updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/patients/{op_num}/instructions:
    put:
      tags: [Doctor]
      summary: Update patient instructions
      parameters:
        - $ref: "#/components/parameters/OpNumPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInstructionsRequest"
      responses:
        "200":
          description: Instructions updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorPatientDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/notifications:
    get:
      tags: [Doctor]
      summary: List doctor notifications
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/IsReadQuery"
      responses:
        "200":
          description: Notifications retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /doctors/notifications/read-all:
    patch:
      tags: [Doctor]
      summary: Mark all doctor notifications as read
      responses:
        "200":
          description: Notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkedCountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /doctors/notifications/{notification_id}/read:
    patch:
      tags: [Doctor]
      summary: Mark doctor notification as read
      parameters:
        - $ref: "#/components/parameters/NotificationIdPath"
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /doctors/notifications/stream:
    get:
      tags: [Doctor]
      summary: Stream doctor notifications
      description: |
        Opens a Server-Sent Events connection for doctor notifications. The stream
        authenticates a DOCTOR JWT from either the Authorization header or the
        `token` query parameter for EventSource clients.
      parameters:
        - in: query
          name: token
          required: false
          schema:
            type: string
          description: Optional JWT when Authorization header is not used
      responses:
        "200":
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: notification
                  data: {"id":"6870...","title":"Notification","type":"GENERAL"}
